name: Generate Pacman

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: NareshXcodes
          outputs: |
            dist/pacman.svg?type=pacman&color_snake=%2358A6FF&color_dots=%231f6feb,%231f6feb,%230d5bd1,%23003d99,%23002766&color_empty=%230d1117
            dist/pacman-dark.svg?type=pacman&palette=github-dark&color_snake=%2358A6FF&color_dots=%231f6feb,%231f6feb,%230d5bd1,%23003d99,%23002766&color_empty=%230d1117

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
